name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: write          # SBOM is uploaded as a release asset
  id-token: write          # Required for Trusted Publisher (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build cyclonedx-bom

      - name: Build package
        run: python -m build

      - name: Generate CycloneDX SBOM
        run: |
          # SBOM of the source tree (not just deps): includes our package
          # plus its transitive runtime dependencies. JSON format for tooling.
          cyclonedx-py environment --of JSON --output-file dist/sbom.cdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Attach SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/sbom.cdx.json --clobber

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and test
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short

  publish:
    runs-on: ubuntu-latest
    needs: [build, test]
    # environment: pypi  # Requires matching PyPI Trusted Publisher config with environment
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Drop SBOM before PyPI upload
        # PyPI rejects unknown file types; the SBOM is already attached to
        # the GitHub Release and does not belong in the wheel/sdist upload.
        run: rm -f dist/sbom.cdx.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed — uses Trusted Publisher (OIDC)

  mcp-registry:
    # Publish the MCP server entry to registry.modelcontextprotocol.io
    # AFTER the PyPI artefact is live — the registry verifies the package
    # description on PyPI carries the `mcp-name: io.github.…/ai-audit-trail`
    # marker, so the registry job must run last.
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set release version into server.json
        # Strip the leading "v" from the tag and write it into both
        # server.json top-level "version" and packages[0].version so the
        # MCP Registry entry stays in lock-step with the PyPI release.
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' \
            server.json > server.tmp && mv server.tmp server.json
          echo "Will publish MCP entry for version: $VERSION"
          cat server.json

      - name: Wait for PyPI to mirror the new version
        # The registry validates that the version on PyPI carries the
        # mcp-name marker. PyPI's CDN can lag by ~30s after a Trusted
        # Publisher upload — give it time before mcp-publisher checks.
        run: sleep 60

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
